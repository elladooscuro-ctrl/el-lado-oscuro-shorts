name: Publicar Shorts - El Lado Oscuro

on:
  # NOTA (23 jul 2026): el cron nativo de GitHub Actions se deshabilito
  # porque el disparo real ahora lo hace un servicio externo
  # (cron-job.org) que llama a la API workflow_dispatch cada 30 minutos.
  # Tener ambos activos al mismo tiempo causaba que dos ejecuciones
  # dispararan casi simultaneamente (una por el cron nativo de GitHub y
  # otra por cron-job.org), lo que en un dia produjo 19 shorts publicados
  # en vez del maximo de 10. El bloque concurrency de abajo ya evita
  # corridas en paralelo, pero se deja solo workflow_dispatch como unico
  # disparador para eliminar la fuente redundante.
  # schedule:
  #   - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: publicar-shorts-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Instalar fuentes (para TextClip del CTA)
        run: sudo apt-get install -y fonts-dejavu-core
      - name: Instalar ImageMagick (para TextClip del CTA)
        run: sudo apt-get install -y imagemagick && sudo sed -i '/pattern="@\*"/d' /etc/ImageMagick-6/policy.xml
      - name: Instalar dependencias de Python
        run: pip install -r requirements.txt

      - name: Generar y publicar short
        env:
          DRIVE_FOLDER_ID_RAIZ: ${{ secrets.DRIVE_FOLDER_ID_RAIZ }}
          DRIVE_CLIENT_ID: ${{ secrets.DRIVE_CLIENT_ID }}
          DRIVE_CLIENT_SECRET: ${{ secrets.DRIVE_CLIENT_SECRET }}
          DRIVE_REFRESH_TOKEN: ${{ secrets.DRIVE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generar_short.py
